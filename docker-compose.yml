version: '3.8'

services:
  # ------------------------------------------------------------
  # MongoDB - persistent database service
  # ------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: shortlink-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    networks:
      - shortlink-network

  # ------------------------------------------------------------
  # Backend API - Express + TypeScript
  # ------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shortlink-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      BASE_URL: http://localhost:5000
      MONGO_URI: mongodb://mongo:27017/shortlink-pro
      JWT_SECRET: ${JWT_SECRET:-change_this_to_a_long_random_secret_key}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    depends_on:
      - mongo
    networks:
      - shortlink-network

  # ------------------------------------------------------------
  # Frontend - React + Vite, served via nginx
  # ------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
        VITE_APP_BASE_URL: http://localhost:5000
    container_name: shortlink-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - shortlink-network

networks:
  shortlink-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
